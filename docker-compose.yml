version: '3.8'

services:
  db:
    image: postgres:15
    container_name: odoo_test_db
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo_test_2024
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - odoo-db-data:/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    networks:
      - odoo_network
    restart: unless-stopped

  odoo:
    image: odoo:18.0
    container_name: odoo_test_instance
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo_test_2024
    volumes:
      - ./:/mnt/extra-addons
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./logs:/var/log/odoo
    networks:
      - odoo_network
    restart: unless-stopped
    command: >
      bash -c "
        mkdir -p /var/log/odoo &&
        odoo --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons 
             --db_host=db 
             --db_port=5432 
             --db_user=odoo 
             --db_password=odoo_test_2024 
             --logfile=/var/log/odoo/odoo.log 
             --log-level=info
             --workers=0
             --dev=all
      "

volumes:
  odoo-web-data:
  odoo-db-data:

networks:
  odoo_network:
    driver: bridge
